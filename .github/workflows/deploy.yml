name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

# Production environment values; set these as repository variables/secrets.
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}     # e.g. prodmee-slate
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}           # e.g. prodmee-slate
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}           # e.g. prodmee-slate

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for OIDC role assumption
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA::8}"
          docker build -t "$IMAGE" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      # The task definition references :latest; forcing a new deployment pulls it.
      # migrate --force runs automatically on container boot (see docker/entrypoint.sh).
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
